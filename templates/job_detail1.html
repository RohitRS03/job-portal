{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width: 800px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="fw-bold">{{ job.title }}</h3>
      <p class="text-muted">{{ job.company }} • {{ job.location }}</p>
      <p class="text-muted">Posted on {{ job.published_at }}</p>
      <hr>
      <p class="lead">{{ job.summary }}</p>
      <p>{{ job.details }}</p>
      <h5 class="mt-4">Criteria:</h5>
      <ul>
        {% for c in job.criteria %}
          <li>{{ c }}</li>
        {% endfor %}
      </ul>
      <a href="{{ url_for('job_index') }}" class="btn btn-secondary mt-3">← Back to Jobs</a>
    </div>
  </div>
</div>
{% endblock %}
