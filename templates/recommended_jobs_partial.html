{% for job in jobs %}
  <div class="col-md-6 mb-4">
    <div class="card job-card h-100 border-0 shadow-sm">
      <div class="card-body d-flex flex-column">
        
        <!-- Job Title -->
        <h6 class="fw-bold mb-1">
          <i class="bi bi-briefcase-fill text-primary me-2"></i> {{ job.title }}
        </h6>
        <p class="text-muted mb-2">
          at <em>{{ job.company }}</em>
        </p>

        <!-- Location & Type -->
        <p class="text-muted small mb-2">
          <i class="bi bi-geo-alt me-1"></i> {{ job.location }} 
          • <span class="badge bg-info text-dark">{{ job.job_type }}</span>
        </p>

        <!-- Skills -->
        {% if job.skills %}
          <div class="mt-2 mb-3">
            {% for skill in job.skills[:3] %}
              <span class="badge rounded-pill bg-light text-dark me-1">{{ skill }}</span>
            {% endfor %}
          </div>
        {% endif %}

        <!-- Action Button -->
        <div class="mt-auto">
          <a href="{{ url_for('job_detail', job_id=job.id) }}" 
             class="btn btn-gradient btn-sm w-100 fw-bold">
            <i class="bi bi-eye me-1"></i> View Details
          </a>
        </div>
      </div>
    </div>
  </div>
{% else %}
  <div class="col-12">
    <p class="text-muted fst-italic">
      <i class="bi bi-info-circle me-2"></i> No recommended jobs yet.
    </p>
  </div>
{% endfor %}
